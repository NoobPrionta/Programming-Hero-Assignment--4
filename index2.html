<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Application Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind v4 -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 text-gray-800">

  <div class="max-w-6xl mx-auto p-6">

    <!-- TITLE -->
    <h1 class="text-3xl font-bold mb-8">Job Application Tracker</h1>

    <!-- DASHBOARD -->
    <div class="grid gap-6 md:grid-cols-3 mb-8">

      <div class="bg-white p-6 rounded-xl shadow">
        <p class="text-gray-500 mb-2">Total</p>
        <h2 id="totalCount" class="text-2xl font-semibold">0</h2>
      </div>

      <div class="bg-white p-6 rounded-xl shadow">
        <p class="text-gray-500 mb-2">Interview</p>
        <h2 id="interviewCount" class="text-2xl font-semibold text-green-600">0</h2>
      </div>

      <div class="bg-white p-6 rounded-xl shadow">
        <p class="text-gray-500 mb-2">Rejected</p>
        <h2 id="rejectedCount" class="text-2xl font-semibold text-red-600">0</h2>
      </div>

    </div>

    <!-- JOB SECTION -->
    <div class="bg-white p-6 rounded-xl shadow">

      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">Available Jobs</h2>
        <span id="tabCount" class="text-sm text-gray-500">0 jobs</span>
      </div>

      <!-- TABS -->
      <div class="flex gap-3 mb-6">
        <button class="tab bg-blue-600 text-white px-4 py-2 rounded-md text-sm"
                data-tab="all">
          All
        </button>

        <button class="tab bg-gray-200 px-4 py-2 rounded-md text-sm"
                data-tab="interview">
          Interview
        </button>

        <button class="tab bg-gray-200 px-4 py-2 rounded-md text-sm"
                data-tab="rejected">
          Rejected
        </button>
      </div>

      <!-- JOB CONTAINER -->
      <div id="jobsContainer" class="grid gap-6"></div>

    </div>

  </div>

  <script src="script2.js"></script>
</body>
</html>
